<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#16A34A"/>

  <!-- dumbbell rotated 45deg like lucide -->
  <g transform="rotate(-45, 256, 256)">
    <!-- left outer plate -->
    <rect x="60" y="196" width="76" height="120" rx="20" fill="white"/>
    <!-- left outer plate hole detail -->
    <rect x="74" y="220" width="48" height="72" rx="10" fill="#16A34A"/>
    <rect x="82" y="232" width="32" height="48" rx="6" fill="white"/>

    <!-- left collar -->
    <rect x="136" y="216" width="44" height="80" rx="10" fill="white"/>

    <!-- bar -->
    <rect x="180" y="234" width="152" height="44" rx="8" fill="white"/>

    <!-- right collar -->
    <rect x="332" y="216" width="44" height="80" rx="10" fill="white"/>

    <!-- right outer plate -->
    <rect x="376" y="196" width="76" height="120" rx="20" fill="white"/>
    <!-- right outer plate hole detail -->
    <rect x="390" y="220" width="48" height="72" rx="10" fill="#16A34A"/>
    <rect x="398" y="232" width="32" height="48" rx="6" fill="white"/>
  </g>
</svg>
